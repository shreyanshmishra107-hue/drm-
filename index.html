<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sportv - Stream Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box;}
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;}
        /* Hide Shaka spinner */
        .shaka-spinner-container { display: none !important;}
        /* Video container */
        [data-shaka-player-container] { position: absolute; inset: 0;}
        video { width: 100%; height: 100%;}
        /* Error message styling */
        .error-message { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            background: rgba(0,0,0,0.8); 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            z-index: 1000; 
            max-width: 80%;
        }
    </style>
</head>
<body>

<!-- Video Player -->
<div data-shaka-player-container>
    <video autoplay playsinline muted data-shaka-player id="video" style="width:100%;height:100%"></video>
</div>

<script>
// Flag to prevent double initialization
let playerInitialized = false;

// Parse URL parameters - supports both formats
function getStreamInfo() {
    const params = new URLSearchParams(window.location.search);
    const urlParam = params.get('url');
    if (!urlParam) return null;

    try {
        const decodedUrl = decodeURIComponent(urlParam);
        const keysParam = params.get('keys');

        if (keysParam) {
            console.log('Detected separate url+keys format');
            const decodedKeys = decodeURIComponent(keysParam);
            const keyParts = decodedKeys.split(':');
            if (keyParts.length !== 2) {
                throw new Error('Invalid keys format - expected keyid:key');
            }
            return {
                mpdUrl: decodedUrl,
                keyId: keyParts[0],
                key: keyParts[1],
                format: 'separate'
            };
        } else {
            console.log('Detected combined format');
            const parts = decodedUrl.split('|');
            if (parts.length !== 2) {
                if (parts.length === 1) {
                    console.log('No keys provided - attempting to play without DRM');
                    return { mpdUrl: decodedUrl, noDrm: true, format: 'no-drm' };
                }
                throw new Error('Invalid combined format - expected url|keyid:key');
            }
            const mpdUrl = parts[0];
            const keys = parts[1].split(':');
            if (keys.length !== 2) {
                throw new Error('Invalid key format in combined string');
            }
            return {
                mpdUrl: mpdUrl,
                keyId: keys[0],
                key: keys[1],
                format: 'combined'
            };
        }
    } catch (e) {
        console.error('Error parsing URL:', e);
        return null;
    }
}

// Initialize player once
async function initPlayer() {
    if (playerInitialized) {
        console.log('Player already initialized, skipping...');
        return;
    }

    const video = document.getElementById("video");
    if (!video.ui) {
        setTimeout(initPlayer, 100);
        return;
    }

    playerInitialized = true;
    console.log('Initializing player...');

    const streamInfo = getStreamInfo();
    if (!streamInfo) {
        showError('Invalid or missing URL parameters. Use: ?url=MPD_URL|KEYID:KEY or ?url=MPD_URL&keys=KEYID:KEY');
        return;
    }

    const ui = video.ui;
    const controls = ui.getControls();
    const player = controls.getPlayer();

    if (streamInfo.noDrm) {
        console.log('Playing without DRM configuration');
        player.configure({ drm: {} });
    } else if (streamInfo.keyId && streamInfo.key) {
        console.log('Configuring DRM with keys');
        const drmConfig = {};
        drmConfig[streamInfo.keyId] = streamInfo.key;
        player.configure({ drm: { clearKeys: drmConfig } });
    }

    ui.configure({
        controlPanelElements: [
            "play_pause",
            "mute",
            "volume",
            "spacer",
            "time_and_duration",
            "quality",
            "fullscreen",
            "overflow_menu"
        ]
    });

    try {
        console.log('Loading stream:', streamInfo.mpdUrl);
        if (streamInfo.keyId) console.log('Using key ID:', streamInfo.keyId);

        await player.load(streamInfo.mpdUrl);
        console.log('Stream loaded successfully');

        try {
            await video.play();
        } catch (playError) {
            console.log('Autoplay prevented:', playError);
        }
    } catch (e) {
        console.error('Error loading stream:', e);
        showError('Error loading stream: ' + e.message);
    }
}

function showError(message) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-message';
    errorDiv.innerHTML = `
        <h3>Error</h3>
        <p>${message}</p>
        <p style="font-size: 12px; margin-top: 10px;">
            Supported formats:<br>
            1. ?url=MPD_URL|KEYID:KEY<br>
            2. ?url=MPD_URL&keys=KEYID:KEY
        </p>
    `;
    document.body.appendChild(errorDiv);
}

document.addEventListener("shaka-ui-loaded", function() {
    if (!playerInitialized) initPlayer();
});

if ('wakeLock' in navigator) {
    const requestWakeLock = async () => {
        try {
            await navigator.wakeLock.request('screen');
        } catch (err) {
            console.log('Wake Lock error:', err);
        }
    };
    requestWakeLock();
}

document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('video');
    video.setAttribute('autoplay', '');
    video.setAttribute('playsinline', '');
    video.setAttribute('muted', '');

    if (window.shaka?.ui) {
        if (!playerInitialized) initPlayer();
    }
});
</script>

</body>
</html>
